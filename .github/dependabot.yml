version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 10
    assignees:
      - OxDev-max
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "chore(deps):"
    allow:
      - dependency-type: "all"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
    open-pull-requests-limit: 5
    assignees:
      - OxDev-max
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci(deps):"
