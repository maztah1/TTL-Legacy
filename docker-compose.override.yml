version: '3.9'

services:
  db:
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - ./backend/migrations:/docker-entrypoint-initdb.d

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    environment:
      RUST_ENV: development
      RUST_BACKTRACE: "1"
    ports:
      - "3000:3000"

  stellar-quickstart:
    environment:
      STANDALONE: "true"
